<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Product</title>
</head>

<body>

<h2>Add New Product</h2>

<form th:action="@{/products}" th:object="${product}" method="post">

    <label>Name:</label>
    <input type="text" th:field="*{name}" required>
    <br><br>

    <label>Category:</label>
    <input type="text" th:field="*{category}" required>
    <br><br>

    <label>Quantity:</label>
    <input type="number" th:field="*{quantity}" required>
    <br><br>

    <label>Price:</label>
    <input type="number" step="0.01" th:field="*{price}" required>
    <br><br>

    <label>Store:</label>

    <select th:field="*{store}">
        <option value="">Select Store</option>
        <option th:each="store : ${stores}"
                th:value="${store.id}"
                th:text="${store.name}">
        </option>
    </select>

    <br><br>

    <button type="submit">Save Product</button>

</form>

</body>
</html>
