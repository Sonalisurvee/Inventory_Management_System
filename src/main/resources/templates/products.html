<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>
</head>

<body>

<div>
    <a href="/">Dashboard</a> |
    <a href="/stores">Stores</a> |
    <a href="/products">Products</a> |
    <a href="/categories">Category</a> |
    <a href="/products/low-stock">Low Stock</a>

</div>

<hr>

<h2>Inventory Product List</h2>

<form th:action="@{/products/search}" method="get">
    <input type="text" name="keyword" placeholder="Search product">
    <button type="submit">Search</button>
</form>

<br><br>

<a href="/products/new">Add Product</a>

<form method="get">

    <label>Filter by Store:</label>

    <select onchange="location = this.value;">

        <option value="">Select Store</option>

        <option th:each="store : ${stores}"
                th:value="@{/products/store/{id}(id=${store.id})}"
                th:text="${store.name}">
        </option>

    </select>

</form>

<br><br>

<table border="1">

    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Quantity</th>
        <th>Price</th>
        <th>Store</th>
        <th>Stock</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="product : ${products}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td th:text="${product.category.categoryName}"></td>
        <td th:text="${product.quantity}"></td>
        <td th:text="${product.price}"></td>
        <td th:text="${product.store != null ? product.store.name : 'N/A'}"></td>
        <td>
            <a th:href="@{/products/add-stock/{id}(id=${product.id})}">
                Add Stock
            </a>
        </td>
        <td>
            <a th:href="@{/products/edit/{id}(id=${product.id})}">Edit</a>
        </td>
        <td>
            <a th:href="@{/products/delete/{id}(id=${product.id})}"
               onclick="return confirm('Are you sure you want to delete this product?')">
                Delete
            </a>
        </td>
    </tr>

    </tbody>

</table>

</body>
</html>
